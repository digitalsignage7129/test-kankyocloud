<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* iframeは「等倍」で配置し、中の位置は親要素で制御する */
    iframe {
      width: 1536px;  /* 1024px * 1.5倍 で計算 */
      height: 1350px; /* 900px * 1.5倍 で計算 */
      border: none;
      
      /* transformを使わず、直接座標をマイナスに設定 */
      position: absolute;
      top: -465px;  /* (-310px * 1.5倍) */
      left: -660px; /* (-440px * 1.5倍) */
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

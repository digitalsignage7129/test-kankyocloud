<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      /* 元々こうしていたはずです：画面全体を窓にする */
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #000000;
      display: flex;
      justify-content: center; /* 横方向のセンター寄せ */
      align-items: center;     /* 縦方向のセンター寄せ */
    }

    .signage-window iframe {
      width: 1024px;
      height: 900px;
      border: none;
      transform-origin: top left;
      /* あなたが苦労して決めたあの位置と拡大率 */
      transform: translate(-440px, -310px) scale(1.5);
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

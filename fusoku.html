<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      /* ここで右側の余白をカットする横幅を指定 */
      width: 60vw; 
      height: 100vh;
      margin: 0 auto;
      overflow: hidden;
      background-color: #000000;
    }

    .signage-window iframe {
      width: 1024px;
      height: 500px;
      border: none;
      /* ここで位置と拡大率だけを管理する */
      transform-origin: top left;
      transform: translate(-400px, -20px) scale(1.5);
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

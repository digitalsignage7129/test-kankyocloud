<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Environmental Monitoring Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      /* 横幅を少し広げて、右側の見切れを解消する準備 */
      width: 70vw; 
      height: 100vh;
      position: relative;
      overflow: hidden;
      background-color: #000000;
      margin: 0 auto;
    }

    .signage-window iframe {
      position: absolute;
      border: none;
      width: 1024px;      
      height: 600px;      

      top: 50%;
      left: 50%;

      /* 【調整ポイント】
         ・translate(-50%, -50%) → translate(-58%, -50%)
           1番目を -58% にすることで、左へグッと寄せました。
           2番目の -50% は「上の頭が完璧だった」今の数値をそのまま維持しています。
         ・scale(1.6) はそのまま維持します。
      */
      transform: translate(-67%, -50%) scale(1.6);
      
      transform-origin: center center;
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

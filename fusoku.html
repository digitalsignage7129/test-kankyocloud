<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .wrapper {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* サイネージの表示枠に自動フィットさせるためのコンテナ */
    .fit-container {
      width: 1024px;  /* iframeの元の幅 */
      height: 900px;  /* iframeの元の高さ */
      transform: scale(0.5); /* 【ここだけ調整】枠に合わせて 0.3〜0.8 で変更 */
      transform-origin: center center;
    }

    iframe {
      width: 1024px;
      height: 900px;
      border: none;
      /* ここは変更不可。あなたの完璧な調整値 */
      transform: translate(-440px, -310px) scale(1.5);
      transform-origin: top left;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="fit-container">
      <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
    </div>
  </div>
</body>
</html>

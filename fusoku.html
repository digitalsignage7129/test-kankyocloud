<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* 窓を「ブラウザのサイズ固定」にする */
    .signage-window {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #000000;
    }

    /* iframeを「動かさない」 */
    iframe {
      width: 1024px;
      height: 900px;
      border: none;
      /* ここだけがあなたの「切り抜き座標」です */
      transform-origin: top left;
      transform: translate(-440px, -310px) scale(1.5);
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

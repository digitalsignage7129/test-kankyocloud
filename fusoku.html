<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Environmental Monitoring Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      width: 70vw; 
      height: 100vh;
      position: relative;
      overflow: hidden;
      background-color: #000000;
      margin: 0 auto;
    }

    .signage-window iframe {
      position: absolute;
      border: none;
      
      /* 1. 幅と高さ */
      width: 1024px;      
      height: 500px; /* ここで縦幅を調整（小さいほど縦がギュッと詰まる） */

      /* 2. 上の頭を固定する設定 */
      top: 0; 
      left: 50%;

      /* 3. 横の左寄せと、拡大率 */
      /* translateの最初の数値で横位置調整、scaleで全体拡大 */
      transform: translateX(-68%) scale(1.6);
      
      /* 回転や拡大の基準を「左上」に固定 */
      transform-origin: top center;
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .signage-window {
      /* 画面の縦横比を固定し、常に最大サイズを取る */
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    iframe {
      border: none;
      width: 100%;
      height: 100%;
      /* ここが心臓部：
         scaleは使わず、iframeの中身を親枠に合わせる設定
         位置合わせは絶対座標の「%」指定で行うことで、
         解像度が変わっても自動で比率が維持されます
      */
      position: absolute;
      top: -34%;   /* 上からの位置（割合で指定） */
      left: -43%;  /* 左からの位置（割合で指定） */
      transform: scale(1.6); /* 拡大率は固定し、枠内に収める */
      transform-origin: left top;
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

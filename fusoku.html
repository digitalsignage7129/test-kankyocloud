<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #container {
      width: 100%;
      height: 100%;
      transform-origin: top left; /* 左上を基準に縮小 */
    }

    .signage-window {
      width: 65vw;
      height: 65vh;
      margin: 10vh auto;
      overflow: hidden;
      background-color: #000000;
    }

    .signage-window iframe {
      width: 1024px;
      height: 900px;
      border: none;
      transform-origin: top left;
      /* 調整済みの完璧な位置設定 */
      transform: translate(-440px, -310px) scale(1.5);
    }
  </style>
</head>
<body>
  <div id="container">
    <div class="signage-window">
      <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
    </div>
  </div>

  <script>
    function autoFit() {
      // 画面（サイネージの表示枠）の幅に合わせてcontainerを縮小
      var container = document.getElementById('container');
      var scale = window.innerWidth / document.documentElement.clientWidth;
      container.style.transform = "scale(" + scale + ")";
    }
    window.onload = autoFit;
    window.onresize = autoFit;
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Environmental Monitoring Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      width: 60vw; /* 横幅は前回の状態を維持 */
      height: 100vh;
      position: relative;
      overflow: hidden;
      background-color: #000000;
      margin: 0 auto;
    }

    .signage-window iframe {
      position: absolute;
      border: none;
      width: 1024px;      
      height: 900px;      

      top: 50%;
      left: 50%;

      /* 【調整箇所】
         ・scale(1.05)：一回り縮小して、縦幅を画面に収めました
         ・translate(-58%, -45%)：縦位置を少し上にズラして調整（-54%より上に引き上げました）
      */
      transform: translate(-58%, -45%) scale(1.05);
      
      transform-origin: center center;
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

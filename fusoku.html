<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      /* 【ここが縦の削り担当】 */
      width: 62vw;
      height: 65vh;  /* 100vhから80vhに減らすと、下の20%分が物理的に消えます */
      margin: 10vh auto; /* 上下に10vhずつの余白を作って真ん中に寄せる */
      overflow: hidden;
      background-color: #000000;
    }

    .signage-window iframe {
      width: 1024px;
      height: 900px;
      border: none;
      transform-origin: top left;
      /* 【ここが位置と拡大担当】 */
      transform: translate(-430px, -300px) scale(1.5);
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

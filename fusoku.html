<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Environmental Monitoring Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      width: 70vw; 
      height: 100vh;
      position: relative;
      overflow: hidden;
      background-color: #000000;
      margin: 0 auto;
    }

    .signage-window iframe {
      position: absolute;
      border: none;
      
      /* 【ここがポイント！】
         幅(1024px)は変えずに、高さ(height)をいじることで
         縦の表示エリアだけを狭めたり広げたりできます。
      */
      width: 1024px;      
      height: 600px; /* ここを調整！数値を増やすと縦に伸び、減らすと縮みます */

      top: 50%;
      left: 50%;

      /* 【上の頭・左寄せはここで固定】
         translateは変更せず、scaleも 1.6 で固定します。
      */
      transform: translate(-67%, -50%) scale(1.6);
      
      transform-origin: center center;
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

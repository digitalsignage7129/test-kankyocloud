<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    iframe {
      /* iframeを親枠に対して完全に固定する */
      border: none;
      position: absolute;
      top: -310px;  /* ここが今の位置 */
      left: -440px; /* ここが今の位置 */
      
      /* ポイント：iframeのサイズを小さく絞る */
      width: 1024px;
      height: 900px;
      
      /* スケールアップで枠いっぱいに広げる */
      transform: scale(2.0); 
      transform-origin: left top;
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

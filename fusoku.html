<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .signage-container {
      /* サイネージ側の表示領域を想定したベースサイズ */
      width: 1024px;
      height: 900px;
      
      /* ここが肝：画面サイズに合わせて自動伸縮する */
      transform: scale(calc(min(100vw / 1024, 100vh / 900)));
      transform-origin: center center;
    }

    iframe {
      width: 1024px;
      height: 900px;
      border: none;
      /* 元々あなたが苦労して切り抜いた場所を維持 */
      transform: translate(-440px, -310px) scale(1.5);
      transform-origin: left top;
    }
  </style>
</head>
<body>
  <div class="signage-container">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

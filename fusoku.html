<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #000000;
    }

    iframe {
      /* iframe自体のサイズを今のサイネージの大きさに合わせて強制的に広げます */
      width: 1536px;
      height: 1350px;
      border: none;
      
      /* 位置調整は「margin」を使って、泥臭く微調整します */
      /* これなら、左上が合っているならそこを起点に少しずつ動かせます */
      margin-left: -440px; 
      margin-top: -310px;
      
      /* scaleは使わないことで、サイトのレイアウト崩れを完全に防ぎます */
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

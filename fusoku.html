<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      /* ここで基準を左上にロックします */
      position: relative;
    }

    iframe {
      width: 1024px;
      height: 900px;
      border: none;
      /* これ以上、左右にズレないように設定 */
      position: absolute;
      top: 0;
      left: 0;
      
      /* 切り抜き座標をここで一括固定 */
      transform-origin: 0 0;
      transform: translate(-440px, -310px) scale(1.5);
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* サイネージソフトの枠そのもの */
    .signage-window {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* iframe自体に全ての設定を集約 */
    iframe {
      border: none;
      width: 1024px;
      height: 900px;
      
      /* 以下の設定が、あなたが完璧に調整した「位置」そのものです */
      transform-origin: top left;
      transform: translate(-440px, -310px) scale(1.5);
      
      /* 【最終手段】サイネージの枠に合わない場合、ここだけを調整 */
      /* この1行だけで、表示サイズを枠に合わせます（translate等は動かしません） */
      zoom: 0.6; 
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

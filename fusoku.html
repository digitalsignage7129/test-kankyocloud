<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    iframe {
      /* サイトのレイアウトを崩さない固定値 */
      width: 1920px;  /* あえて大きく取ってレスポンシブ崩れを防ぐ */
      height: 1200px;
      border: none;
      
      /* 位置と拡大を個別に管理 */
      position: absolute;
      left: -440px; /* ここで調整した位置をそのまま反映 */
      top: -310px;
      
      /* 拡大率の調整 */
      transform: scale(1.5);
      transform-origin: top left;
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

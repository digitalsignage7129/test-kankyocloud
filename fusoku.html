<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Environmental Monitoring Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background-color: #000000;
    }

    .signage-window iframe {
      position: absolute;
      border: none;
      
      /* 1. 頭の位置を絶対固定 */
      top: 0;
      left: 50%;
      
      /* 2. iframeの中身サイズ（ここを調整すると表示範囲が変わる） */
      width: 1024px;      
      height: 900px; 

      /* 3. 左寄せと拡大 */
      /* translateXで左へずらす、scaleで拡大 */
      transform: translateX(-55%) scale(1.5);
      transform-origin: top center;
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

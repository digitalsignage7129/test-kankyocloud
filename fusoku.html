<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #wrapper {
      /* 枠に合わせて自動伸縮させるための設定 */
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    iframe {
      width: 1024px;
      height: 900px;
      border: none;
      /* ここであなたの完璧な位置と拡大を固定 */
      transform: translate(-440px, -310px) scale(1.5);
      /* 重要：ここを調整することで、サイネージ枠へのフィット率を変えられます */
      zoom: 0.5; 
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

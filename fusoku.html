<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Environmental Monitoring Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      width: 60vw; 
      height: 100vh;
      position: relative;
      overflow: hidden;
      background-color: #000000;
      margin: 0 auto;
    }

    .signage-window iframe {
      position: absolute;
      border: none;
      width: 1024px;      
      height: 900px;      

      top: 50%;
      left: 50%;

      /* 【調整ポイント】
         ・scale(1.05) → scale(1.6) に大幅アップ（これで画面いっぱいに広がります）
         ・translate(-58%, -45%) → translate(-50%, -50%) に調整
      */
      transform: translate(-50%, -50%) scale(1.6);
      
      transform-origin: center center;
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

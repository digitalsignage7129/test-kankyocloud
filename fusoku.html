<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* サイネージ全体を包む枠 */
    .viewport {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .signage-window {
      /* 元の調整を維持するためのサイズ */
      width: 65vw;
      height: 65vh;
      overflow: hidden;
      background-color: #000000;
      /* ここでサイネージの枠サイズに合わせて全体縮小 */
      transform: scale(0.6); 
      transform-origin: center center;
    }

    .signage-window iframe {
      width: 1024px;
      height: 900px;
      border: none;
      /* ここは変更していません（あなたの調整値） */
      transform-origin: top left;
      transform: translate(-440px, -310px) scale(1.5);
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="signage-window">
      <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
    </div>
  </div>
</body>
</html>

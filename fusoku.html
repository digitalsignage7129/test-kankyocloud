<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    iframe {
      width: 1024px;
      height: 900px;
      border: none;
      /* ここでズレを補正しつつ、枠に合わせて拡大 */
      transform: translate(-440px, -310px) scale(2.0);
      transform-origin: left top;
    }
  </style>
</head>
<body>
  <div class="signage-container">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>騒音振動計 総合監視モニター</title>
<style>
  /* 全体のリセットと背景設定 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background-color: #0d1117;
    font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    color: #ffffff;
  }

  /* 画面全体のレイアウト */
  .main-container {
    display: flex;
    width: 1920px;
    height: 1080px;
    padding: 30px;
    gap: 30px; /* パネルとモニターの間の隙間 */
  }

  /* ==========================================
     左側：情報・ロゴエリア（サイドバー）
     【大変更】横幅を660pxから920pxへ超ワイド化して右の余白を消滅させる
     ========================================== */
  .sidebar {
    width: 920px; 
    height: 1020px;
    background: #161b22;
    border-radius: 16px;
    padding: 50px 40px; /* 中の余白も広げて贅沢に空間を使う */
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border: 3px solid #30363d;
  }

  /* ロゴ配置エリア */
  .logo-area {
    width: 100%;
    text-align: center;
    padding-bottom: 30px;
    border-bottom: 3px solid #30363d;
  }
  .logo-area img {
    /* 元サイズが692pxなので、ワイド化した画面でもボケずに超綺麗に映ります */
    width: 692px;
    height: 174px;
    object-fit: contain;
  }

  /* メインタイトル */
  .main-title {
    margin-top: 30px;
    font-size: 52px; /* さらに文字を巨大化 */
    font-weight: 900;
    letter-spacing: 4px;
    color: #58a6ff;
    text-align: center;
    line-height: 1.3;
  }

  /* 設置場所一覧リスト（ワイド画面に合わせてゆったり配置） */
  .location-list {
    margin-top: -10px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  .location-item {
    font-size: 38px; /* さらに文字を大きく */
    font-weight: 900;
    padding: 28px 35px;
    background: #21262d;
    border-radius: 14px;
    border-left: 18px solid #ccc; /* 識別ラインも極太に強化 */
    display: flex;
    align-items: center;
    white-space: nowrap;
  }
  .loc-1 { border-left-color: #ff453a; }
  .loc-2 { border-left-color: #0a84ff; }
  .loc-3 { border-left-color: #30d158; }
  .loc-4 { border-left-color: #bf5af2; }

  /* 下部のアナウンスエリア */
  .footer-notice {
    background: #21262d;
    padding: 30px 20px;
    border-radius: 14px;
    border: 3px dashed #484f58;
    text-align: center;
  }
  .notice-title {
    font-size: 32px;
    color: #8b949e;
    margin-bottom: 15px;
    font-weight: 900;
    letter-spacing: 3px;
  }
  .notice-body {
    font-size: 52px; /* 看板として圧倒的な視認性に */
    font-weight: 900;
    color: #ffcc00;
    letter-spacing: 2px;
  }

  /* ==========================================
     右側：4つのモニターを並べるエリア（2×2）
     ========================================== */
  .monitor-container {
    flex: 1; /* 残りのスペース（910px分）を自動で使い切る */
    height: 1020px;
    position: relative;
    overflow: hidden;
  }

  .monitor-grid {
    position: absolute;
    top: 0;
    left: 0;
    width: 1140px;
    height: 1220px;
    display: grid;
    grid-template-columns: repeat(2, 540px);
    grid-template-rows: repeat(2, 590px); 
    gap: 40px;
    
    transform-origin: 0 0;
    transform: scale(0.83); /* 縦を1080pxに収めるための黄金比率 */
  }

  /* モニターユニット */
  .monitor-card {
    width: 540px;
    height: 590px;
    background: #000000;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 3px solid #30363d;
  }

  /* モニターごとのヘッダー看板 */
  .monitor-header {
    height: 50px;
    line-height: 48px;
    padding-left: 20px;
    font-size: 26px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 1px;
  }
  .id-1 .monitor-header { background-color: #a62a22; }
  .id-2 .monitor-header { background-color: #1a5fb4; }
  .id-3 .monitor-header { background-color: #266e35; }
  .id-4 .monitor-header { background-color: #6e266b; }

  /* モニター本体（等倍窓） */
  .monitor-body {
    width: 540px;
    height: 540px; 
    overflow: hidden;
    position: relative;
    background: #000000;
  }
  .monitor-body iframe {
    border: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 540px;
    height: 540px; 
  }
</style>
</head>
<body>

<div class="main-container">
  
  <!-- 左側：情報・ロゴエリア（超フルワイド版） -->
  <div class="sidebar">
    <div class="logo-area">
      <img src="logo.png" width="692" height="174" alt="会社ロゴ">
      <div class="main-title">騒音振動計 総合モニター</div>
    </div>
    
    <!-- 設置場所一覧 -->
    <div class="location-list">
      <div class="location-item loc-1">● 1号機：敷地境界（東側）</div>
      <div class="location-item loc-2">● 2号機：重機作業エリア</div>
      <div class="location-item loc-3">● 3号機：近隣住宅側</div>
      <div class="location-item loc-4">● 4号機：資材搬入口</div>
    </div>
    
    <!-- 環境目安アナウンス -->
    <div class="footer-notice">
      <div class="notice-title">自主管理基準値</div>
      <div class="notice-body">騒音:85dB / 振動:65dB</div>
    </div>
  </div>

  <!-- 右側：4つのモニターエリア -->
  <div class="monitor-container">
    <div class="monitor-grid">

      <!-- 1号機 -->
      <div class="monitor-card id-1">
        <div class="monitor-header">1号機：敷地境界（東側）</div>
        <div class="monitor-body">
          <iframe src="souon.html" scrolling="no"></iframe>
        </div>
      </div>

      <!-- 2号機 -->
      <div class="monitor-card id-2">
        <div class="monitor-header">2号機：重機作業エリア</div>
        <div class="monitor-body">
          <iframe src="souon2.html" scrolling="no"></iframe>
        </div>
      </div>

      <!-- 3号機 -->
      <div class="monitor-card id-3">
        <div class="monitor-header">3号機：近隣住宅側</div>
        <div class="monitor-body">
          <iframe src="souon2.html" scrolling="no"></iframe>
        </div>
      </div>

      <!-- 4号機 -->
      <div class="monitor-card id-4">
        <div class="monitor-header">4号機：資材搬入口</div>
        <div class="monitor-body">
          <iframe src="souon2.html" scrolling="no"></iframe>
        </div>
      </div>

    </div>
  </div>

</div>

</body>
</html>

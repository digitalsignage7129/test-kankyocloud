<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>騒音振動計 総合監視モニター</title>
<style>
  /* 全体のリセットと背景設定 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background-color: #0d1117;
    /* サイネージで最も潰れにくい「太い角ゴシック」を最優先に指定 */
    font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    color: #ffffff;
  }

  /* 画面全体のレイアウト */
  .main-container {
    display: flex;
    width: 1920px;
    height: 1080px;
    padding: 30px;
    gap: 30px;
  }

  /* ==========================================
     左側：情報・ロゴエリア（サイドバー）
     ========================================== */
  .sidebar {
    width: 660px;
    height: 1020px;
    background: #161b22;
    border-radius: 16px;
    padding: 40px 30px; /* 横の余白を削って文字幅を確保 */
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border: 3px solid #30363d; /* 枠線も太く */
  }

  /* ロゴ配置エリア */
  .logo-area {
    width: 100%;
    text-align: center;
    padding-bottom: 25px;
    border-bottom: 3px solid #30363d;
  }
  .logo-area img {
    width: 100%;
    height: auto;
    object-fit: contain;
  }

  /* 【巨大化】メインタイトル */
  .main-title {
    margin-top: 30px;
    font-size: 46px; /* さらに拡大 */
    font-weight: 900; /* 最もおどろおどろしく太い設定 */
    letter-spacing: 2px;
    color: #58a6ff;
    text-align: center;
    line-height: 1.3;
  }

  /* 【巨大化】設置場所一覧リスト */
  .location-list {
    margin-top: -20px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .location-item {
    font-size: 34px; /* 28pxから34pxへ一気に巨大化。看板サイズです */
    font-weight: 900; /* 爆太 */
    padding: 25px 20px;
    background: #21262d;
    border-radius: 12px;
    border-left: 14px solid #ccc; /* 横の識別ラインも極太に */
    display: flex;
    align-items: center;
    white-space: nowrap; /* 文字潰れ・改行を防ぐ */
  }
  .loc-1 { border-left-color: #ff453a; }
  .loc-2 { border-left-color: #0a84ff; }
  .loc-3 { border-left-color: #30d158; }
  .loc-4 { border-left-color: #bf5af2; }

  /* 【巨大化】下部のアナウンスエリア */
  .footer-notice {
    background: #21262d;
    padding: 25px 15px;
    border-radius: 12px;
    border: 3px dashed #484f58;
    text-align: center;
  }
  .notice-title {
    font-size: 28px; /* 22pxから28pxへ拡大 */
    color: #8b949e;
    margin-bottom: 12px;
    font-weight: 900;
    letter-spacing: 2px;
  }
  .notice-body {
    font-size: 44px; /* 32pxから44pxへ爆大化。圧倒的な存在感に */
    font-weight: 900;
    color: #ffcc00;
    letter-spacing: 1px;
  }

  /* ==========================================
     右側：4つのモニターを並べるエリア（2×2）
     ========================================== */
  .monitor-grid {
    width: 1140px;
    height: 1020px;
    display: grid;
    grid-template-columns: repeat(2, 540px);
    grid-template-rows: repeat(2, 490px); /* ヘッダーが大きくなった分、縦を10px拡大 */
    gap: 40px; /* 隙間を40pxにバランス調整 */
    justify-content: center;
    align-content: center;
  }

  /* モニターユニット */
  .monitor-card {
    width: 540px;
    height: 490px; /* 50px(ヘッダー) + 440px(中身) */
    background: #000000;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 3px solid #30363d;
  }

  /* 【巨大化】モニターごとのヘッダー看板 */
  .monitor-header {
    height: 50px; /* 高さを40pxから50pxに拡張 */
    line-height: 48px; /* 文字を中央に */
    padding-left: 20px;
    font-size: 26px; /* 22pxから26pxへ拡大。ガツンと太く見せます */
    font-weight: 900; /* 爆太 */
    color: #ffffff;
    letter-spacing: 1px;
  }
  .id-1 .monitor-header { background-color: #a62a22; }
  .id-2 .monitor-header { background-color: #1a5fb4; }
  .id-3 .monitor-header { background-color: #266e35; }
  .id-4 .monitor-header { background-color: #6e266b; }

  /* モニター本体（等倍窓） */
  .monitor-body {
    width: 540px;
    height: 440px;
    overflow: hidden;
    position: relative;
    background: #000000;
  }
  .monitor-body iframe {
    border: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 540px;
    height: 440px;
  }
</style>
</head>
<body>

<div class="main-container">
  
  <div class="sidebar">
    <div class="logo-area">
      <img src="logo.png" width="692" height="174" alt="会社ロゴ">
      <div class="main-title">騒音振動計 総合モニター</div>
    </div>
    
    <div class="location-list">
      <div class="location-item loc-1">● 1号機：敷地境界（東側）</div>
      <div class="location-item loc-2">● 2号機：重機作業エリア</div>
      <div class="location-item loc-3">● 3号機：近隣住宅側</div>
      <div class="location-item loc-4">● 4号機：資材搬入口</div>
    </div>
    
    <div class="footer-notice">
      <div class="notice-title">自主管理基準値</div>
      <div class="notice-body">騒音:85dB / 振動:65dB</div>
    </div>
  </div>

  <div class="monitor-grid">

    <div class="monitor-card id-1">
      <div class="monitor-header">1号機：敷地境界（東側）</div>
      <div class="monitor-body">
        <iframe src="souon.html" scrolling="no"></iframe>
      </div>
    </div>

    <div class="monitor-card id-2">
      <div class="monitor-header">2号機：重機作業エリア</div>
      <div class="monitor-body">
        <iframe src="souon2.html" scrolling="no"></iframe>
      </div>
    </div>

    <div class="monitor-card id-3">
      <div class="monitor-header">3号機：近隣住宅側</div>
      <div class="monitor-body">
        <iframe src="souon2.html" scrolling="no"></iframe>
      </div>
    </div>

    <div class="monitor-card id-4">
      <div class="monitor-header">4号機：資材搬入口</div>
      <div class="monitor-body">
        <iframe src="souon2.html" scrolling="no"></iframe>
      </div>
    </div>

  </div>

</div>

</body>
</html>

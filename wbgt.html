<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>WBGT Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* 1. 外枠（覗き窓）の設定 */
    .signage-window {
      width: 55vw;        /* ここの数値を小さくすると、右側が削れていきます */
      height: 100vh;      /* 縦幅は完璧な状態を維持 */
      position: relative;
      overflow: hidden;
      background-color: #000000;
      margin: 0 auto;     /* 画面の中央に配置 */

      /* 【調整用】一時的に太い赤線を引いています。位置が合ったらこの1行を消してください */
      border: 5px solid #ff0000; 
      box-sizing: border-box;    /* 線の太さでサイズがズレるのを防ぐ設定 */
    }

    /* 2. iframeの設定（左と上が完璧だった時の数値を固定） */
    .signage-window iframe {
      position: absolute;
      border: none;
      width: 1024px;      
      height: 900px;      

      top: 50%;
      left: 50%;

      /* 左-96%、上-62%、拡大率1.35の黄金比を維持 */
      transform: translate(-56%, -62%) scale(1.35);
      
      transform-origin: center center;
    }
  </style>
</head>
<body>

  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/WBGT?LoID=2415" scrolling="no"></iframe>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>WBGT Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background-color: #000000;
    }

    .signage-window iframe {
      position: absolute;
      border: none;
      
      /* 【ここを変更】横長ではなく、黒い部分に合わせたスリムな幅（520px）にする */
      width: 520px;
      height: 650px;

      /* 画面のほぼ中央を基準にする */
      top: 50%;
      left: 50%;

      /* 【ここを変更】
        ・幅をスリムにしたので、左への引っ張り（1番目の数値）は -50% 近辺で綺麗に収まるようになります。
        ・もし上下がはみ出る・足りない場合は 2番目の数値（-51%）を微調整してください。
        ・画面いっぱいに広げるために scale を 1.85 まで引き上げています。
      */
      transform: translate(-50%, -51%) scale(1.85);
      
      transform-origin: center center;
    }
  </style>
</head>
<body>

  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/WBGT?LoID=2415" scrolling="no"></iframe>
  </div>

</body>
</html>

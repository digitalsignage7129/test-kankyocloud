<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>WBGT Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* 1. 外枠（覗き窓）の設定
       ここを「100vw（画面いっぱい）」から「55vw」のように狭めることで、
       完璧だった状態のまま、右側の余白だけを非表示に（削り落とす）します。
    */
    .signage-window {
      width: 55vw;        /* 【ここを調整】右側を削るために横幅を狭くしました */
      height: 100vh;      /* 縦幅は完璧だったのでそのまま */
      position: relative;
      overflow: hidden;
      background-color: #000000;
      margin: 0 auto;     /* もし画面の真ん中に置きたい場合はこれを入れておきます */
    }

    /* 2. iframeの設定（完璧だった時の数値をそのまま維持） */
    .signage-window iframe {
      position: absolute;
      border: none;
      width: 1024px;      /* 元に戻しました */
      height: 900px;      /* 元に戻しました */

      top: 50%;
      left: 50%;

      /* 左-96%、上-62%、拡大率1.35の「完璧だったバランス」をそのまま固定 */
      transform: translate(-96%, -62%) scale(1.35);
      
      transform-origin: center center;
    }
  </style>
</head>
<body>

  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/WBGT?LoID=2415" scrolling="no"></iframe>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>WBGT Signage</title>
  <style>
    /* 画面全体の余白をなくし、背景を黒で固定 */
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* 1. サイネージに表示したい「切り抜き窓」のサイズ */
    .signage-window {
      width: 100vw;       /* 画面の横幅いっぱいに表示 */
      height: 100vh;      /* 画面の縦幅いっぱいに表示 */
      position: relative;
      overflow: hidden;
      background-color: #000000;
    }

    /* 2. 元サイトを枠に合わせて拡大・位置調整する設定 */
    .signage-window iframe {
      position: absolute;
      border: none;

      /* 元サイトをデスクトップ表示（横1024px）として固定で読み込む */
      width: 1024px;
      height: 900px;

      /* 【重要】黒い部分が中央にくるように、位置と拡大率を調整 */
      /* 相手のサイトの「黒い枠」をサイネージ画面にぴったり合わせる魔法の数値です */
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%) scale(0.95);
      
      /* スケールの基準点を中央にする */
      transform-origin: center center;
    }
  </style>
</head>
<body>

  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/WBGT?LoID=2415" scrolling="no"></iframe>
  </div>

</body>
</html>

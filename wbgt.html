<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>WBGT Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background-color: #000000;
    }

    .signage-window iframe {
      position: absolute;
      border: none;
      
      /* 元サイトの読み込みサイズを固定 */
      width: 1024px;
      height: 900px;

      /* 表示位置の基準を中央に設定 */
      top: 50%;
      left: 50%;

      /* 【ここを調整しました】
        ・-53% → 左側へもっと引っ張る（左の余白を消す）
        ・-56% → 上側へもっと引っ張る（上の余白を消す）
        ・scale(1.05) → 全体を1.05倍に少し拡大して、四隅の余白を画面外に押し出す
      */
      transform: translate(-53%, -56%) scale(1.05);
      
      transform-origin: center center;
    }
  </style>
</head>
<body>

  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/WBGT?LoID=2415" scrolling="no"></iframe>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>WBGT Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background-color: #000000;
    }

    .signage-window iframe {
      position: absolute;
      border: none;
      width: 1024px;
      height: 900px;

      /* 画面のほぼ中央を基準にする */
      top: 50%;
      left: 50%;

      /* 【大幅に調整しました】
        ・-57%：前回(-53%)よりさらに左へグッと引っ張る
        ・-62%：前回(-56%)よりさらに上へグッと引っ張る
        ・scale(1.35)：前回(1.05)より一気に拡大して余白を完全に画面の外へ押し出す
      */
      transform: translate(-95%, -62%) scale(1.35);
      
      transform-origin: center center;
    }
  </style>
</head>
<body>

  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/WBGT?LoID=2415" scrolling="no"></iframe>
  </div>

</body>
</html>

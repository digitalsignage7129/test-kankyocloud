<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>WBGT Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* 1. 外枠（覗き窓）の設定 */
    .signage-window {
      /* 調整した横幅をここに維持してください（例として55vwにしています） */
      width: 55vw;        
      height: 100vh;      
      position: relative;
      overflow: hidden;
      background-color: #000000;
      margin: 0 auto;     
      
      /* 赤線（border）を完全に削除しました */
    }

    /* 2. iframeの設定（バチッと決まった黄金比を維持） */
    .signage-window iframe {
      position: absolute;
      border: none;
      width: 1024px;      
      height: 900px;      

      top: 50%;
      left: 50%;

      /* 左-96%、上-62%、拡大率1.35 */
      transform: translate(-62%, -62%) scale(1.35);
      
      transform-origin: center center;
    }
  </style>
</head>
<body>

  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/WBGT?LoID=2415" scrolling="no"></iframe>
  </div>

</body>
</html>

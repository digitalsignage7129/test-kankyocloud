<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Environmental Monitoring Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      /* 横幅の調整用（必要に応じてここを変えてください） */
      width: 60vw; 
      height: 100vh;
      position: relative;
      overflow: hidden;
      background-color: #000000;
      margin: 0 auto;
    }

    .signage-window iframe {
      position: absolute;
      border: none;
      
      width: 1024px;      
      height: 900px;      

      top: 50%;
      left: 50%;

      /* 【調整ポイント】
         scaleを 1.35 → 1.25 に下げて、全体を一回り小さくしました。
         これで「大きすぎる感じ」が抑えられるはずです。
      */
      transform: translate(-68%, -58%) scale(1.25);
      
      transform-origin: center center;
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/WL" scrolling="no"></iframe>
  </div>
</body>
</html>

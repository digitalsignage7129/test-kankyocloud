<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Environmental Monitoring Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* 1. 外枠（覗き窓）の設定
       横長感を抑えるために、まずは前回のスリムな横幅（55vw）を引き継いでいます。
    */
    .signage-window {
      width: 55vw;        /* 右側をもっと削るなら小さく、広げるなら大きく */
      height: 100vh;      
      position: relative;
      overflow: hidden;
      background-color: #000000;
      margin: 0 auto;     

      /* 【調整用】位置合わせ用の赤線 */
      border: 5px solid #ff0000; 
      box-sizing: border-box;    
    }

    /* 2. iframeの設定（初期位置） */
    .signage-window iframe {
      position: absolute;
      border: none;
      width: 1024px;      
      height: 900px;      

      top: 50%;
      left: 50%;

      /* 【スタート位置の設定】
         一旦、真ん中あたりをガッツリ1.5倍に拡大して中央に寄せる設定にしています。
         ここから上下左右に引っ張って微調整します。
      */
      transform: translate(-50%, -50%) scale(1.50);
      
      transform-origin: center center;
    }
  </style>
</head>
<body>

  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/SSC/RN?LoID=244" scrolling="no"></iframe>
  </div>

</body>
</html>

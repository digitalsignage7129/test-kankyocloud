<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>WBGT Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      /* 【ここを調整するだけでOK】 */
      /* 縦幅はそのままに、横幅だけを調整できます */
      width: 60vw; 
      height: 100vh;
      position: relative;
      overflow: hidden;
      background-color: #000000;
      margin: 0 auto;
    }

    .signage-window iframe {
      position: absolute;
      border: none;
      
      /* 前回の「縦が完璧だった設定」をそのまま維持 */
      width: 1024px;      
      height: 900px;      

      top: 50%;
      left: 50%;

      /* 前回、「これで縦が完璧」と言っていただいた数値をそのまま入れます */
      /* もし前の数値と微妙に違う場合は、手元のメモにある数値に書き換えてください */
      transform: translate(-58%, -56%) scale(1.35);
      
      transform-origin: center center;
    }
  </style>
</head>
<body>
  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/SSC/RN?LoID=244" scrolling="no"></iframe>
  </div>
</body>
</html>

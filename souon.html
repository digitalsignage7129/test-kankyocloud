<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, height=512">
<title>騒音振動モニター</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 612px;
    height: 525px;
    overflow: hidden;
    background: #000;
  }
  .crop {
    position: absolute;
    top: 0;
    left: 0;
    width: 670px;
    height: 540px;
    overflow: hidden;
    transform-origin: 0 0;
  }
  .crop iframe {
    border: none;
    position: absolute;
    width: 1920px;
    height: 1080px;
    left: -700px;
    top: -204px;
  }
</style>
</head>
<body>
  <div class="crop" id="crop">
    <iframe
      src="https://www2.edam.ne.jp/Public/00574/Sokutei/SSC/RN?LoID=244"
      scrolling="no"
    ></iframe>
  </div>
  <script>
    var c = document.getElementById('crop');
    var w = parseInt(getComputedStyle(c).width);
    var h = parseInt(getComputedStyle(c).height);
    c.style.transform = 'scale('+(600/w)+','+(512/h)+')';
  </script>
</body>
</html>

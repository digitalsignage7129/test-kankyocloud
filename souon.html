<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Environmental Monitoring Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      /* 右側に余白が出ないよう、画面幅に合わせて自動調整 */
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background-color: #000000;
    }

    .signage-window iframe {
      position: absolute;
      border: none;
      
      /* 【変更点】iframeの横幅を600pxに制限し、横長感を殺す */
      width: 600px;      
      height: 800px;      

      top: 50%;
      left: 50%;

      /* 横幅を狭めたので、translateとscaleを再調整。
         左余白が気になる場合はtranslateの最初の数値(今は-50%)を、
         下余白が気になる場合はscaleを微調整してください。
      */
      transform: translate(-50%, -50%) scale(1.6);
      
      transform-origin: center center;
    }
  </style>
</head>
<body>

  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/SSC/RN?LoID=244" scrolling="no"></iframe>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Environmental Monitoring Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* 1. 外枠（覗き窓）の設定
       「右が見切れている」「横幅を広げる必要あり」とのことなので、
       横幅を「55vw」から「75vw」へと大きく広げました。
    */
    .signage-window {
      width: 75vw;        /* 【変更】右側を広く見せるために大幅に広げました */
      height: 100vh;      
      position: relative;
      overflow: hidden;
      background-color: #000000;
      margin: 0 auto;     

      /* 【調整用】位置合わせ用の赤線 */
      border: 5px solid #ff0000; 
      box-sizing: border-box;    
    }

    /* 2. iframeの設定 */
    .signage-window iframe {
      position: absolute;
      border: none;
      width: 1024px;      
      height: 900px;      

      top: 50%;
      left: 50%;

      /* 【変更】
         ・下が見切れているのを防ぐため、拡大率を「scale(1.50)」から「scale(1.25)」に少し縮めました。
         ・頭の位置（上の完璧な位置）が変わらないように、上への引っ張り（2番目の数値）を「-50%」から「-58%」に調整してバランスをとっています。
      */
      transform: translate(-50%, -58%) scale(1.25);
      
      transform-origin: center center;
    }
  </style>
</head>
<body>

  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/SSC/RN?LoID=244" scrolling="no"></iframe>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Environmental Monitoring Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .signage-window {
      width: 75vw;        
      height: 100vh;      
      position: relative;
      overflow: hidden;
      background-color: #000000;
      margin: 0 auto;     

      /* 【調整用】位置合わせ用の赤線 */
      border: 5px solid #ff0000; 
      box-sizing: border-box;    
    }

    .signage-window iframe {
      position: absolute;
      border: none;
      width: 1024px;      
      height: 900px;      

      top: 50%;
      left: 50%;

      /* 【変更点】
         ・左の余白を消すため：translateの最初の数値を -50% → -58% へと左に移動
         ・下の余白を埋めるため：scaleを 1.25 → 1.35 へと少し大きく拡大
         ・頭の位置（上）を維持：translateの2番目の数値を -58% → -56% に調整
      */
      transform: translate(-58%, -56%) scale(1.35);
      
      transform-origin: center center;
    }
  </style>
</head>
<body>

  <div class="signage-window">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/SSC/RN?LoID=244" scrolling="no"></iframe>
  </div>

</body>
</html>

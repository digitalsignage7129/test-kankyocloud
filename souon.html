<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  html, body {
    width: 600px;
    height: 512px;
    overflow: hidden;
    background: #000;
  }
  .crop {
    position: absolute;
    top: 0; left: 0;
    width: 600px;
    height: 512px;
    overflow: hidden;
  }
  .crop iframe {
    /* サイトに「600x512の狭い画面だ」と認識させる */
    width: 600px; 
    height: 512px;
    border: none;
    /* あとは必要に応じてscaleで引き伸ばす */
    transform-origin: 0 0;
    transform: scale(1.0); 
  }
</style>
</head>
<body>
  <div class="crop">
    <iframe src="https://www2.edam.ne.jp/Public/00574/Sokutei/FLD/RN" scrolling="no"></iframe>
  </div>
</body>
</html>
